name: Deploy to VPS

# Reemplaza deploy-worker.yml. Ahora deploya AMBOS — Next.js (frontend +
# API routes) Y worker BullMQ — al mismo VPS. Decide qué redeployar
# segun los archivos que cambiaron en el commit.
#
# Vercel ya NO se usa (DNS apunta al VPS desde Fase 4 — 2026-05-23).
# Si tienes el repo aun conectado a Vercel, desactiva el auto-deploy
# desde dashboard Vercel → Settings → Git → Disconnect.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Si dos commits llegan a la vez, encolar — NO ejecutar en paralelo
  # (race condition en git pull + npm install).
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          # Subimos timeout porque next build con ~1392 deps puede tardar
          # 2-3 min, mas npm install otros 1-2 min. 10 min de margen.
          command_timeout: 10m
          script: |
            set -e

            cd /apps/futbol

            # Diff de commits para decidir qué rebuildear
            BEFORE=$(git rev-parse HEAD 2>/dev/null || echo "")

            # Pull strategy: si hay cambios locales no commiteados (tipicamente
            # package-lock.json regenerado por npm install manual), los
            # descartamos PORQUE el deploy va a regenerar todo igualmente. Si
            # quieres preservar cambios de develop en VPS, no los hagas en
            # /apps/futbol — usa una copia separada.
            #
            # 1. Descarta cambios sin commitear en archivos rastreados.
            # 2. Fetch + reset --hard a origin/main. Sobreescribe cualquier
            #    commit local no pusheado (raro pero posible si testeas en VPS).
            git fetch origin main
            git reset --hard origin/main

            AFTER=$(git rev-parse HEAD)

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "No new commits — nothing to deploy"
              # NOTA: NO salimos aquí. Aunque no haya commits nuevos, dejamos que
              # corra la guardia de public/ del final (self-heal). Es idempotente
              # y barata, y protege si public quedó dañado por cualquier motivo.
              CHANGED=""
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
            fi
            echo "=== Changed files ==="
            echo "$CHANGED"
            echo "====================="

            # ─────────────────────────────────────────────────────────────
            # FRONTEND: rebuild Next.js
            # ─────────────────────────────────────────────────────────────
            # Triggers: rutas, componentes, lib/* (algunas las usa el worker
            # tambien — esas tambien disparan el bloque worker abajo),
            # middleware, config, deps, assets publicos.
            WEB_RE='^(app/|components/|lib/|middleware\.js|next\.config\.|package\.json|package-lock\.json|public/|hooks/|jsconfig\.json)'
            if echo "$CHANGED" | grep -qE "$WEB_RE"; then
              echo ""
              echo "▶ Frontend changed — rebuilding Next.js"

              # Dev deps necesarias para next build (typescript types, etc).
              NODE_ENV=development npm install --include=dev --no-audit --no-fund

              # Build prod
              NODE_ENV=production npm run build

              # ── PUBLIC para el server standalone de Node ──
              # El standalone de Next NO incluye public/ — hay que ponérselo al
              # lado. ANTES esto era un SYMLINK:
              #     ln -sfn "$PWD/public" .next/standalone/public
              # y era la RAÍZ del bug recurrente: cualquier rm/ln/cp que tocara
              # .next/standalone/public podía SEGUIR el enlace y vaciar el public
              # REAL del repo (/apps/futbol/public), que es de donde sirve Caddy
              # (ver scripts/vps/Caddyfile: root * /apps/futbol/public).
              #
              # SOLUCIÓN DEFINITIVA: COPIA, no symlink. Así el public del repo
              # NUNCA es destino de ninguna operación del standalone → imposible
              # vaciarlo desde aquí. Es ~1.9MB, copia trivial.
              [ -L .next/standalone/public ] && unlink .next/standalone/public || true
              rm -rf .next/standalone/public
              mkdir -p .next/standalone/public
              cp -a public/. .next/standalone/public/

              # ── .next/static ── (regenerado por next build, NO compartido con
              # el repo → aquí un symlink SÍ es seguro: su target es build output
              # efímero, no archivos versionados que debamos preservar).
              mkdir -p .next/standalone/.next
              [ -L .next/standalone/.next/static ] && rm -f .next/standalone/.next/static
              [ -d .next/standalone/.next/static ] && [ ! -L .next/standalone/.next/static ] && rm -rf .next/standalone/.next/static || true
              ln -sfn "$PWD/.next/static" .next/standalone/.next/static

              # Restart (no reload) para que el server standalone tome el build
              # nuevo sin servir desde un working dir viejo.
              pm2 restart cfanalisis-web --update-env

              echo "✓ Next.js redeployed"
            else
              echo ""
              echo "○ Frontend NOT changed — skipping Next.js build"
            fi

            # ─────────────────────────────────────────────────────────────
            # WORKER: rebuild + restart
            # ─────────────────────────────────────────────────────────────
            # Triggers: codigo del worker (apps/cfanalisis-worker/) o
            # cualquier lib/* que el worker importa dinamicamente via
            # apps/cfanalisis-worker/src/shared.ts. Si cambia una lib que
            # el worker NO usa (ej lib/stripe.js, lib/zeptomail.js), no
            # disparamos restart del worker.
            WORKER_RE='^(apps/cfanalisis-worker/|lib/(api-football|mlb-stats-api|combinada|baseball-model|baseball-calibration|baseball-features|baseball-ml|odds-api|redis|sanity-cache|supabase|supabase-cache|db|webpush|leagues|context-engine|context-probabilities|meta-features|adn|h2h|market-labels|descriptive-stats)\.js$|scripts/(reenrich-baseball|train-baseball-meta-models)\.js$)'
            if echo "$CHANGED" | grep -qE "$WORKER_RE"; then
              echo ""
              echo "▶ Worker changed — rebuilding worker"

              cd /apps/futbol/apps/cfanalisis-worker

              # Worker deps incluyendo dev (TypeScript necesita tsc).
              npm install --include=dev --no-audit --no-fund

              # Compile TS → dist/
              npm run build

              # Reload pm2 — recarga el worker sea cual sea su topología:
              #   · monolito  → cfanalisis-worker        (pre Fase 1)
              #   · partido   → cfanalisis-rt + cfanalisis-heavy (Fase 1 activa)
              # `|| true` evita que `set -e` aborte el deploy si alguno no existe
              # (según si ya migraste a la topología partida en el VPS).
              WORKER_RELOADED=0
              for proc in cfanalisis-rt cfanalisis-heavy cfanalisis-worker; do
                if pm2 reload "$proc" --update-env 2>/dev/null; then
                  echo "  ✓ pm2 reload $proc"
                  WORKER_RELOADED=1
                fi
              done
              if [ "$WORKER_RELOADED" = "0" ]; then
                echo "  ⚠ ningún proceso worker recargado — revisa 'pm2 list' (nombres esperados: cfanalisis-rt/cfanalisis-heavy o cfanalisis-worker)"
              fi

              cd /apps/futbol
              echo "✓ Worker redeployed"
            else
              echo ""
              echo "○ Worker NOT changed — skipping worker rebuild"
            fi

            # ─────────────────────────────────────────────────────────────
            # GUARDIA PUBLIC INCONDICIONAL — corre SIEMPRE, en TODOS los deploys
            # (frontend, worker-only, e incluso "no new commits").
            # ─────────────────────────────────────────────────────────────
            # Caddy sirve logo/favicon/iconos/manifest DIRECTAMENTE desde
            # /apps/futbol/public. Garantizamos que ese directorio SIEMPRE refleje
            # el repo tras cualquier deploy, pase lo que pase arriba. public/ está
            # 100% trackeado en git, así que `git checkout -- public/` restaura
            # cualquier archivo borrado. Es idempotente y solo toca lo versionado.
            cd /apps/futbol

            # Si por algún arreglo manual previo /apps/futbol/public quedó como
            # SYMLINK (en vez de directorio real), lo deshacemos para que git
            # restaure el directorio real con su contenido.
            if [ -L public ]; then
              echo "⚠ /apps/futbol/public era un SYMLINK — lo elimino para restaurar el dir real"
              unlink public
            fi

            git checkout -- public/ 2>/dev/null || git checkout HEAD -- public/ || true

            echo "── /apps/futbol/public tras la guardia (Caddy lee de aquí) ──"
            ls -la public/ | head -20

            # Verificación dura: si falta un asset crítico, FALLA el deploy en voz
            # alta (set -e) en vez de dejar la web con 404 silenciosos en logo/icons.
            MISSING=0
            for asset in logo.png vflogo.png apple-icon.png icon-192.png icon-512.png manifest.json sw.js; do
              if [ ! -f "public/$asset" ]; then
                echo "✗ FALTA public/$asset"
                MISSING=1
              fi
            done
            if [ "$MISSING" = "1" ]; then
              echo "✗ FATAL: faltan assets en /apps/futbol/public tras el deploy — abortando"
              exit 1
            fi
            echo "✓ public/ íntegro — todos los assets de Caddy presentes"

            echo ""
            echo "=== Deploy summary ==="
            pm2 list
            echo "======================"
