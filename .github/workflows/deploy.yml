name: Deploy to VPS

# Reemplaza deploy-worker.yml. Ahora deploya AMBOS — Next.js (frontend +
# API routes) Y worker BullMQ — al mismo VPS. Decide qué redeployar
# segun los archivos que cambiaron en el commit.
#
# Vercel ya NO se usa (DNS apunta al VPS desde Fase 4 — 2026-05-23).
# Si tienes el repo aun conectado a Vercel, desactiva el auto-deploy
# desde dashboard Vercel → Settings → Git → Disconnect.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Si dos commits llegan a la vez, encolar — NO ejecutar en paralelo
  # (race condition en git pull + npm install).
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          # Subimos timeout porque next build con ~1392 deps puede tardar
          # 2-3 min, mas npm install otros 1-2 min. 10 min de margen.
          command_timeout: 10m
          script: |
            set -e

            cd /apps/futbol

            # Diff de commits para decidir qué rebuildear
            BEFORE=$(git rev-parse HEAD 2>/dev/null || echo "")

            # Pull strategy: si hay cambios locales no commiteados (tipicamente
            # package-lock.json regenerado por npm install manual), los
            # descartamos PORQUE el deploy va a regenerar todo igualmente. Si
            # quieres preservar cambios de develop en VPS, no los hagas en
            # /apps/futbol — usa una copia separada.
            #
            # 1. Descarta cambios sin commitear en archivos rastreados.
            # 2. Fetch + reset --hard a origin/main. Sobreescribe cualquier
            #    commit local no pusheado (raro pero posible si testeas en VPS).
            git fetch origin main
            git reset --hard origin/main

            AFTER=$(git rev-parse HEAD)

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "No new commits — nothing to deploy"
              exit 0
            fi

            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
            echo "=== Changed files ==="
            echo "$CHANGED"
            echo "====================="

            # ─────────────────────────────────────────────────────────────
            # FRONTEND: rebuild Next.js
            # ─────────────────────────────────────────────────────────────
            # Triggers: rutas, componentes, lib/* (algunas las usa el worker
            # tambien — esas tambien disparan el bloque worker abajo),
            # middleware, config, deps, assets publicos.
            WEB_RE='^(app/|components/|lib/|middleware\.js|next\.config\.|package\.json|package-lock\.json|public/|hooks/|jsconfig\.json)'
            if echo "$CHANGED" | grep -qE "$WEB_RE"; then
              echo ""
              echo "▶ Frontend changed — rebuilding Next.js"

              # Dev deps necesarias para next build (typescript types, etc).
              NODE_ENV=development npm install --include=dev --no-audit --no-fund

              # Build prod
              NODE_ENV=production npm run build

              # Next.js standalone NO incluye public/ ni .next/static — hay que
              # enlazarlos manualmente.
              #
              # ⚠ BUG GRAVE corregido aquí: el patrón anterior hacía
              #   rm -rf .next/standalone/public
              # PERO .next/standalone/public ya era un SYMLINK que apuntaba a
              # /apps/futbol/public (el directorio público del repo).
              # `rm -rf` aplicado a un symlink SIGUE el enlace y BORRA EL
              # CONTENIDO al que apunta (no solo el enlace). Resultado: cada
              # deploy VACIABA /apps/futbol/public/, el ln -sfn lo recreaba
              # apuntando a un directorio vacío, y Caddy (que sirve directo
              # desde /apps/futbol/public) daba 404 en logo/favicon/icons.
              # El usuario tenía que copiar los assets a mano tras cada deploy.
              #
              # Fix: borrar SOLO el enlace (no su target) con `rm -f` (sin -r),
              # y reservar `rm -rf` para casos donde sabemos que NO es symlink
              # (mkdir + .next/static es regenerado en cada build). El `-h`
              # extra protege contra el peor caso: si por algún motivo no
              # existiera ya como symlink y fuera dir, no lo recursamos.
              #
              # NO se necesita "copiar public a otro lado" porque /apps/futbol
              # es el repo Y el directorio que Caddy sirve — son el MISMO
              # directorio. git reset --hard ya mantiene public/ actualizado.
              [ -L .next/standalone/public ] && rm -f .next/standalone/public
              [ -d .next/standalone/public ] && [ ! -L .next/standalone/public ] && rm -rf .next/standalone/public || true
              ln -sfn "$PWD/public" .next/standalone/public

              mkdir -p .next/standalone/.next
              # .next/static SÍ es regenerado por `next build`, no es shared
              # con el repo — aquí rm -rf es seguro porque no es un symlink
              # a algo que necesitemos preservar.
              [ -L .next/standalone/.next/static ] && rm -f .next/standalone/.next/static
              [ -d .next/standalone/.next/static ] && [ ! -L .next/standalone/.next/static ] && rm -rf .next/standalone/.next/static || true
              ln -sfn "$PWD/.next/static" .next/standalone/.next/static

              # ─── GUARDIA A PRUEBA DE BALAS ───────────────────────────────
              # Caddy sirve los estáticos DIRECTAMENTE desde /apps/futbol/public
              # (ver scripts/vps/Caddyfile: `root * /apps/futbol/public` +
              # `@static file` + file_server). Para Caddy, lo ÚNICO que importa
              # es que esos archivos existan en public/ del repo — el symlink al
              # standalone es solo para el server de Node y es irrelevante para
              # servir imágenes.
              #
              # public/ está 100% trackeado en git (logo.png, Bet365-Logo.png,
              # icons, etc). `git checkout -- public/` RESTAURA cualquier archivo
              # trackeado que se haya borrado/modificado, pase lo que pase en los
              # pasos de symlink de arriba. Es idempotente y solo toca archivos
              # versionados (los no-trackeados quedan intactos). Con esto, los
              # assets de Caddy NO PUEDEN desaparecer tras un deploy — nunca más.
              git checkout -- public/ 2>/dev/null || true

              # Verificación dura: si algún asset crítico falta, FALLA el deploy
              # en voz alta (set -e) en vez de dejar la web con 404 silenciosos.
              echo "── verificación public/ del repo (Caddy lee de aquí) ──"
              for asset in logo.png Bet365-Logo.png; do
                if [ ! -f "$PWD/public/$asset" ]; then
                  echo "✗ FATAL: public/$asset NO existe tras el build — abortando"
                  exit 1
                fi
              done
              ls -la "$PWD/public/" | head -15
              echo "✓ assets de Caddy presentes en /apps/futbol/public"

              # Restart (no reload) para que el server standalone tome los
              # symlinks nuevos sin servir desde un working dir viejo.
              pm2 restart cfanalisis-web --update-env

              echo "✓ Next.js redeployed"
            else
              echo ""
              echo "○ Frontend NOT changed — skipping Next.js build"
            fi

            # ─────────────────────────────────────────────────────────────
            # WORKER: rebuild + restart
            # ─────────────────────────────────────────────────────────────
            # Triggers: codigo del worker (apps/cfanalisis-worker/) o
            # cualquier lib/* que el worker importa dinamicamente via
            # apps/cfanalisis-worker/src/shared.ts. Si cambia una lib que
            # el worker NO usa (ej lib/stripe.js, lib/zeptomail.js), no
            # disparamos restart del worker.
            WORKER_RE='^(apps/cfanalisis-worker/|lib/(api-football|api-baseball|combinada|calculations|calibration|baseball-model|baseball-calibration|odds-api|redis|sanity-cache|supabase|supabase-cache|db|webpush|leagues|league-half-factors)\.js$)'
            if echo "$CHANGED" | grep -qE "$WORKER_RE"; then
              echo ""
              echo "▶ Worker changed — rebuilding worker"

              cd /apps/futbol/apps/cfanalisis-worker

              # Worker deps incluyendo dev (TypeScript necesita tsc).
              npm install --include=dev --no-audit --no-fund

              # Compile TS → dist/
              npm run build

              # Reload pm2
              pm2 reload cfanalisis-worker --update-env

              cd /apps/futbol
              echo "✓ Worker redeployed"
            else
              echo ""
              echo "○ Worker NOT changed — skipping worker rebuild"
            fi

            echo ""
            echo "=== Deploy summary ==="
            pm2 list
            echo "======================"
