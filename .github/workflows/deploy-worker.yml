name: Deploy Worker to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/cfanalisis-worker/**'
      # El worker importa dinámicamente lib/*.js (ver apps/cfanalisis-worker/src/shared.ts).
      # Si cambia api-football.js, combinada.js, calculations.js, etc. — el worker
      # también debe redeployarse, si no produce análisis con la lógica vieja.
      - 'lib/api-football.js'
      - 'lib/api-baseball.js'
      - 'lib/combinada.js'
      - 'lib/calculations.js'
      - 'lib/calibration.js'
      - 'lib/baseball-model.js'
      - 'lib/baseball-calibration.js'
      - 'lib/odds-api.js'
      - 'lib/redis.js'
      - 'lib/sanity-cache.js'
      - 'lib/supabase.js'
      - 'lib/supabase-cache.js'
      - 'lib/webpush.js'
      - 'lib/pusher.js'
      - 'lib/leagues.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /apps/futbol
            git pull
            pm2 restart cfanalisis-worker