;; ============================================================================
;; PgBouncer config — cfanalisis VPS
;; Path: /etc/pgbouncer/pgbouncer.ini
;;
;; Modo transaction: cada transaction toma una conexion real, se devuelve al
;; pool al COMMIT/ROLLBACK. Optimo para Vercel Functions y workers BullMQ que
;; abren-cierran conexiones rapido. Limitacion: prepared statements globales
;; no funcionan; usa SET LOCAL en vez de SET para variables de sesion.
;; ============================================================================

[databases]
;; Base unica del proyecto. Apuntar al Postgres local en el VPS.
cfanalisis = host=127.0.0.1 port=5432 dbname=cfanalisis

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432

;; ── Auth ───────────────────────────────────────────────────────────────
;; userlist.txt se genera con el comando del INSTALL.md (extrae el hash
;; desde pg_authid manteniendo la misma password que ya usa el rol).
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; ── Pool ───────────────────────────────────────────────────────────────
pool_mode = transaction
max_client_conn = 100
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3

;; ── TLS ────────────────────────────────────────────────────────────────
;; Conexion VPS local (127.0.0.1 ↔ 5432) — sin TLS. Si en el futuro se
;; mueve el Postgres a otra maquina, cambiar a "require" y configurar certs.
server_tls_sslmode = disable
;; PgBouncer atiende solo localhost, no expone a internet. Sin TLS aqui tampoco.
client_tls_sslmode = disable

;; ── Timeouts ───────────────────────────────────────────────────────────
server_idle_timeout = 600
server_lifetime = 3600
query_wait_timeout = 30
;; Si una transaccion supera 5min PgBouncer la corta — protege contra fugas.
idle_transaction_timeout = 300

;; ── Logging / observabilidad ───────────────────────────────────────────
logfile = /var/log/postgresql/pgbouncer.log
pidfile = /var/run/postgresql/pgbouncer.pid

;; admin_users / stats_users pueden consultar la pseudo-DB "pgbouncer":
;;   psql -h 127.0.0.1 -p 6432 -U cfanalisis pgbouncer
;;   SHOW POOLS; SHOW STATS;
admin_users = cfanalisis
stats_users = cfanalisis
